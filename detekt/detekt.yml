config:
    validation: true

style:
    MagicNumber: # I, Linnea Gräf, of sound mind and body, disagree with disabling this rule
        active: false
    UnusedParameter:
        active: true
        ignoreAnnotated:
            - 'SubscribeEvent'
            - 'HandleEvent'
            - 'Mod.EventHandler'
    ReturnCount:
        active: true
        max: 5
        excludeGuardClauses: true
        ignoreAnnotated:
            - 'SubscribeEvent'
            - 'HandleEvent'
            - 'Mod.EventHandler'
    MaxLineLength:
        active: true
        maxLineLength: 140
        excludeCommentStatements: true
    LoopWithTooManyJumpStatements:
        active: true
        maxJumpCount: 3
    UnusedPrivateClass: # seldom intentional
        active: false
    UnusedPrivateFunction: # gets tripped up by API methods
        active: false
    UnusedPrivateProperty: # loops that don't use their iterator
        active: true
        allowedNames: "^(unused|_)$"
    UseCheckOrError:
        active: false
    ForbiddenComment: # every TODO gets flagged
        active: false
    DestructuringDeclarationWithTooManyEntries: # too aggressive
        active: true
        maxDestructuringEntries: 5

ktlint:
    MaximumLineLength: # ktlint - handled by detekt
        active: false
    MultiLineIfElse:
        active: false
    ArgumentListWrapping: # ktlint - way too aggressive
        active: false
    NoBlankLineBeforeRbrace: # pedantic
        active: false
    NoConsecutiveBlankLines: # pedantic
        active: false
    NoEmptyFirstLineInMethodBlock: # pedantic
        active: false
    ParameterListWrapping: # pedantic, can be useful in compact code
        active: false
    CommentSpacing: # handled by custom rule
        active: false
    SpacingBetweenDeclarationsWithAnnotations: # nah
        active: false
    SpacingBetweenDeclarationsWithComments: # also nah
        active: false
    ImportOrdering: # handled by custom rule
        active: false
    AnnotationSpacing: # handled by custom rule
        active: false
    FunctionReturnTypeSpacing:
        maxLineLength: 140
    ParameterWrapping:
        maxLineLength: 140
    PropertyWrapping:
        maxLineLength: 140
    Wrapping:
        maxLineLength: 140
    BlockCommentInitialStarAlignment:
        active: false
    CommentWrapping:
        active: false
    # Todo maybe re-evaluate in the future
    BinaryExpressionWrapping:
        active: false
    BlankLineBetweenWhenConditions:
        active: false
    ClassSignature:
        active: false
    FunctionExpressionBody:
        active: false
    FunctionLiteral:
        active: false
    FunctionSignature:
        active: false
    MixedConditionOperators:
        active: false
    TrailingCommaOnCallSite:
        active: false

complexity:
    CyclomaticComplexMethod: # default allowedComplexity of 14, caught almost every complex method
        active: true
        allowedComplexity: 25
    LongParameterList: # too aggressive, classes can need a lot of params
        active: false
    NestedBlockDepth: # too aggressive
        active: false
    TooManyFunctions: # too aggressive by default (11 on all file types)
        active: true
        allowedFunctionsPerFile: 15
        allowedFunctionsPerClass: 20
        allowedFunctionsPerInterface: 20
        allowedFunctionsPerObject: 20
        allowedFunctionsPerEnum: 11
        ignoreAnnotated:
            - 'SkyHanniModule'
    ComplexCondition: # aggressive by default, at a complexity of 3
        active: true
        allowedConditions: 6
    LongMethod: # default max length of 60, caught way too much
        active: true
        allowedLines: 100

exceptions:
    SwallowedException: # there are valid reasons to do this
        active: false
    ThrowingExceptionsWithoutMessageOrCause: # again, valid reasons
        active: false
    TooGenericExceptionCaught: # sometimes you just need to catch Exception
        active: false
    TooGenericExceptionThrown: # we don't have our own custom exceptions
        active: false

naming:
    ConstructorParameterNaming: # pedantic
        active: false

potential-bugs:
    DoubleMutabilityForCollection: # went crazy about all the mutable collections
        active: false
    HasPlatformType: # false positives on config get() methods
        active: false
    UnreachableCode:
        active: false
